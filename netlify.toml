[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# 301 redirect from .netlify.app to primary .ca domain
# This prevents domain authority splitting for SEO
[[redirects]]
  from = "/*"
  to = "https://prismaiservices.ca/:splat"
  status = 301
  force = true
  [redirects.conditions]
    Host = "prismaiservices.netlify.app"

# 301 redirect old pSEO service pages to services hub
# Preserves link equity from ~288 programmatic pages
[[redirects]]
  from = "/services/ai-*"
  to = "/services/"
  status = 301

[[redirects]]
  from = "/services/custom-*"
  to = "/services/"
  status = 301

# Redirect all 404s to custom 404 page
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404
