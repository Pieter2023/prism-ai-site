[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Ensure technical SEO files are served directly
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 200

[[redirects]]
  from = "/sitemap-index.xml"
  to = "/sitemap-index.xml"
  status = 200

[[redirects]]
  from = "/sitemap-0.xml"
  to = "/sitemap-0.xml"
  status = 200

# Legacy terminology URL redirects (SEO-safe 301)
[[redirects]]
  from = "/services/ai-voicebots"
  to = "/services/ai-voice-agents"
  status = 301

[[redirects]]
  from = "/services/ai-voicebots/"
  to = "/services/ai-voice-agents/"
  status = 301

[[redirects]]
  from = "/blog/ai-voicebot-playbook-2026/"
  to = "/blog/ai-voice-agent-playbook-2026/"
  status = 301

[[redirects]]
  from = "/blog/ai-voicebot-trends-2026/"
  to = "/blog/ai-voice-agent-trends-2026/"
  status = 301

[[redirects]]
  from = "/blog/ai-voicebot-roi-benchmarks-canadian-smb-2026/"
  to = "/blog/ai-voice-agent-roi-benchmarks-canadian-smb-2026/"
  status = 301

# Redirect all 404s to custom 404 page
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404
